<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient: beautiful red shade -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D31027"/>
      <stop offset="100%" stop-color="#EA384D"/>
    </linearGradient>
    
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Document Base -->
  <path d="M 24 16 C 16 16 12 20 12 28 L 12 108 C 12 116 16 120 24 120 L 104 120 C 112 120 116 116 116 108 L 116 48 L 84 16 Z" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Folded Corner -->
  <path d="M 116 48 L 92 48 C 84 48 84 48 84 40 L 84 16 Z" fill="url(#foldGrad)" />

  <!-- Rice Bowl -->
  <path d="M 40 86 C 40 102 52 106 64 106 C 76 106 88 102 88 86 Z" fill="#ffffff" />
  
  <!-- Bowl Rim -->
  <rect x="36" y="80" width="56" height="6" rx="3" fill="#f8f9fa" />
  
  <!-- Chopsticks -->
  <path d="M 72 54 L 96 76" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <path d="M 80 50 L 102 70" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- Rice Grains -->
  <ellipse cx="60" cy="70" rx="3" ry="8" fill="#ffffff" transform="rotate(30 60 70)" />
  <ellipse cx="70" cy="68" rx="3" ry="8" fill="#ffffff" transform="rotate(-20 70 68)" />
  <ellipse cx="50" cy="74" rx="3" ry="8" fill="#ffffff" transform="rotate(45 50 74)" />
  <ellipse cx="64" cy="62" rx="3" ry="8" fill="#ffffff" transform="rotate(10 64 62)" />
  
  <!-- PDF Text Label -->
  <rect x="28" y="36" width="48" height="22" rx="4" fill="#ffffff" />
  <text x="52" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" fill="#D31027" text-anchor="middle">PDF</text>
</svg>
